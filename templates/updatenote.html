{% extends 'base.html' %}

{% block title %}
Update Note
{% endblock %}

{% block content %}

<div class="row justify-content-center">

  <div class="col-md-8 col-lg-7">

    <div class="card shadow">

      <div class="card-header bg-warning">
        <h3 class="mb-0">Edit Note</h3>
      </div>

      <div class="card-body">

        <form method="POST">

          <div class="mb-3">

            <label class="form-label">
              Title
            </label>

            <input type="text" name="title" class="form-control" value="{{ note.title }}" required>

          </div>

          <div class="mb-3">

            <label class="form-label">
              Content
            </label>

            <textarea name="content" rows="6" class="form-control" required>{{ note.content }}</textarea>

          </div>

          <button type="submit" class="btn btn-warning">

            Update Note

          </button>

          <a href="{{ url_for('viewall') }}" class="btn btn-secondary ms-2">

            Cancel

          </a>

        </form>

      </div>

    </div>

  </div>

</div>

{% endblock %}
